<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- This is the correct, modern face-api script -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <title>Face Verification</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            overflow: hidden;
            border-radius: 1rem; /* 16px */
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror mode */
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            width: 24px;
            height: 24px;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Smooth color transition for status text */
        #status {
          transition: color 0.35s ease, opacity 0.35s ease;
        }
    </style>
</head>
<body class="min-h-screen w-full bg-gray-900 text-white flex flex-col items-center justify-center p-4">

    <h1 class="text-3xl font-bold mb-4">
        Face Verification
    </h1>
    <p class="text-lg text-gray-300 mb-6 max-w-md text-center">
        Please position your face inside the oval to log in.
    </p>

    <!-- Video Container -->
    <div id="video-container" class="shadow-xl">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <!-- Status Message -->
    <div id="status" class="mt-4 h-12 text-lg text-center font-medium text-gray-300">
        Loading models and camera...
    </div>

    <!-- Verify Button -->
    <button id="action-button"
            class="w-full max-w-md h-14 px-6 py-3 mt-4 text-lg font-bold text-white bg-blue-600 rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 disabled:bg-gray-500 disabled:opacity-75 flex items-center justify-center"
            disabled>
        <div id="spinner" class="spinner mr-3 hidden"></div>
        <span id="button-text">Verify Face</span>
    </button>
    
    <a href="/logout" class="mt-4 text-gray-400 hover:text-white">Logout</a>

    <!-- In-memory canvas for cropping -->
    <canvas id="crop-canvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const actionButton = document.getElementById('action-button');
        const statusEl = document.getElementById('status');
        const cropCanvas = document.getElementById('crop-canvas');
        
        const buttonText = document.getElementById('button-text');
        const spinner = document.getElementById('spinner');

        // Builds the full, absolute URL (e.g., "http://127.0.0.1:5000/verify")
        const API_URL = window.location.origin + '/verify'; // <-- Points to /verify
        let lastDetection = null;
        let stream = null; // Keep track of the stream to stop it later if needed
        let detectionInterval = null; // To control the detection loop
        let isShowingTemporaryMessage = false; // prevent runDetection immediately overwriting temporary message

        // Function to stop the camera stream
        function stopCameraStream() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                video.srcObject = null; // Clear the video element
                console.log("Stopped camera stream.");
                // Clear the detection interval if it's running
                if (detectionInterval) {
                    cancelAnimationFrame(detectionInterval);
                    detectionInterval = null;
                }
                // Reset UI elements
                const ctx = overlay.getContext('2d');
                 // Check if context exists before clearing
                if (ctx) {
                    ctx.clearRect(0, 0, overlay.width, overlay.height);
                }
                actionButton.disabled = true;
                statusEl.textContent = "Camera stopped.";
                statusEl.classList.remove('text-red-500', 'text-green-400');
            }
        }


        async function startCamera() {
             // Ensure any previous stream is stopped
            stopCameraStream();
            console.log("Attempting to start camera...");
            return new Promise(async (resolve, reject) => {
                try {
                    const constraints = {
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: 'user'
                        }
                    };
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        console.log("Camera started successfully.");
                        overlay.width = video.clientWidth;
                        overlay.height = video.clientHeight;
                        resolve(); 
                    };
                     video.onerror = (e) => { 
                        console.error("Video element error:", e);
                        statusEl.textContent = "Error playing video stream.";
                        statusEl.classList.add('text-red-500');
                        stopCameraStream(); 
                        reject(new Error("Video element error"));
                    };
                } catch (err) {
                    console.error("Camera error:", err);
                    if (err.name === 'NotReadableError' || err.name === 'TrackStartError' || err.message.toLowerCase().includes('device already in use') || err.message.toLowerCase().includes('failed to allocate')) {
                         statusEl.textContent = "Error: Camera is already in use by another app or browser tab. Please close it and refresh.";
                    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError'){
                         statusEl.textContent = "Error: No camera found on this device.";
                    } else if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError'){
                         statusEl.textContent = "Error: Camera permission denied. Please allow access in browser settings.";
                    }
                     else {
                        statusEl.textContent = "Error: Could not access camera.";
                    }
                    statusEl.classList.add('text-red-500');
                    reject(err); 
                }
            });
        }

        async function loadModels() {
            if (typeof faceapi === 'undefined') {
                console.error('face-api.js failed to load. Check script tag.');
                throw new Error('face-api.js not found. Confirm the script tag is present.');
            }
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'),
                faceapi.nets.faceLandmark68TinyNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'),
                faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/')
            ]);
            console.log("FaceAPI models loaded.");
        }

        async function runDetection() {
            // If we're temporarily showing a message like "Access Granted" or "Access Denied" don't overwrite it
            if (isShowingTemporaryMessage) {
                detectionInterval = requestAnimationFrame(runDetection);
                return;
            }

            // Check if stream active and models loaded
            if (!video.srcObject || typeof faceapi === 'undefined' || !faceapi.nets.tinyFaceDetector.params) {
                 if (stream) { // Only continue loop if stream intended to be active
                    detectionInterval = requestAnimationFrame(runDetection);
                 }
                 return; 
            }
            // Check if video is playing
             if (video.paused || video.ended) {
                detectionInterval = requestAnimationFrame(runDetection);
                return;
            }

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
            
            const ctx = overlay.getContext('2d');
            if (!ctx) {
                 console.error("Canvas context lost.");
                 stopCameraStream(); 
                 return;
            }
            ctx.clearRect(0, 0, overlay.width, overlay.height);

            // Failsafe if canvas size not set
            if (overlay.width === 0 || overlay.height === 0) {
                detectionInterval = requestAnimationFrame(runDetection); 
                return;
            }

            const ovalWidth = overlay.width * 0.6;
            const ovalHeight = overlay.height * 0.8;
            const centerX = overlay.width / 2;
            const centerY = overlay.height / 2;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(0, 0, overlay.width, overlay.height);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, ovalWidth / 2, ovalHeight / 2, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            if (detection) {
                lastDetection = detection;
                
                const resizedDetection = faceapi.resizeResults(detection, overlay);

                const mirroredBox = new faceapi.Box({
                    x: overlay.width - resizedDetection.box.right,
                    y: resizedDetection.box.top,
                    width: resizedDetection.box.width,
                    height: resizedDetection.box.height
                });

                const isInside = 
                    mirroredBox.top > (centerY - ovalHeight / 2) &&
                    mirroredBox.bottom < (centerY + ovalHeight / 2) &&
                    mirroredBox.left > (centerX - ovalWidth / 2) &&
                    mirroredBox.right < (centerX + ovalWidth / 2);

                if (isInside) {
                    ctx.strokeStyle = '#4ade80'; // green-400
                    // Only set status if not showing temporary message
                    if (!isShowingTemporaryMessage) {
                        statusEl.textContent = "Face detected!";
                        statusEl.classList.remove('text-red-500');
                        statusEl.classList.add('text-green-400');
                    }
                    actionButton.disabled = false;
                } else {
                    ctx.strokeStyle = '#f87171'; // red-400
                    if (!isShowingTemporaryMessage) {
                        statusEl.textContent = "Please center your face";
                        statusEl.classList.remove('text-green-400');
                        statusEl.classList.add('text-red-500');
                    }
                    actionButton.disabled = true;
                }
            } else {
                lastDetection = null;
                ctx.strokeStyle = '#f87171'; // Red
                if (!isShowingTemporaryMessage) {
                    statusEl.textContent = "Searching for face...";
                    statusEl.classList.remove('text-green-400');
                    statusEl.classList.add('text-red-500');
                }
                actionButton.disabled = true;
            }

            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, ovalWidth / 2, ovalHeight / 2, 0, 0, 2 * Math.PI);
            ctx.stroke();

            detectionInterval = requestAnimationFrame(runDetection); // Continue the loop
        }

        async function captureAndSend() {
            if (!lastDetection) {
                statusEl.textContent = "Could not get a clear detection.";
                statusEl.classList.remove('text-green-400');
                statusEl.classList.add('text-red-500');
                // show temporary error for 3s then reset
                showTemporaryMessageAndReset("Searching for face...", 3000);
                return;
            }

            setLoading(true);

            const box = lastDetection.box;
            const padding = box.width * 0.4; // Add padding around the detected box
            const paddedBox = {
                x: Math.max(0, box.x - padding / 2),
                y: Math.max(0, box.y - padding / 2),
                width: box.width + padding,
                height: box.height + padding
            };

            // Clamp box dimensions to video dimensions
            paddedBox.width = Math.min(video.videoWidth - paddedBox.x, paddedBox.width);
            paddedBox.height = Math.min(video.videoHeight - paddedBox.y, paddedBox.height);

            // Set canvas size for cropping
            cropCanvas.width = paddedBox.width;
            cropCanvas.height = paddedBox.height;

            const cropCtx = cropCanvas.getContext('2d');
            // Flip the context horizontally before drawing to un-mirror the cropped image
            cropCtx.save();
            cropCtx.scale(-1, 1); 
            cropCtx.drawImage(
                video,
                paddedBox.x,
                paddedBox.y,
                paddedBox.width,
                paddedBox.height,
                -paddedBox.width, // Draw at negative width because of scale(-1, 1)
                0,
                paddedBox.width,
                paddedBox.height
            );
            // Reset the transform
            cropCtx.restore();

            const imageData = cropCanvas.toDataURL('image/jpeg', 0.95);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                // Check content type before parsing JSON
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    const data = await response.json(); // Only parse if JSON
                    if (response.ok && data.success) {
                        // -----------------------
                        // ✅ Access Granted flow
                        // -----------------------
                        // Show Access Granted (green) for 3 seconds
                        statusEl.textContent = "Access Granted";
                        statusEl.classList.remove('text-red-500');
                        statusEl.classList.add('text-green-400');
                        setLoading(false);

                        // Temporarily pause detection overwrite
                        isShowingTemporaryMessage = true;

                        setTimeout(() => {
                            // If server wants a redirect, do it after the 3 seconds
                            if (data.redirect) {
                                // stop camera and redirect
                                stopCameraStream();
                                window.location.href = data.redirect;
                                return;
                            }
                            // Otherwise, reset message and resume detection
                            statusEl.textContent = "Searching for face...";
                            statusEl.classList.remove('text-green-400');
                            statusEl.classList.add('text-gray-300');
                            isShowingTemporaryMessage = false;
                            // ensure detection loop is running
                            runDetection();
                        }, 3000);

                    } else {
                        // -----------------------
                        // ❌ Access Denied flow
                        // -----------------------
                        const serverMessage = data.error || 'Unknown face';
                        statusEl.textContent = `Access Denied: ${serverMessage}`;
                        statusEl.classList.remove('text-green-400');
                        statusEl.classList.add('text-red-500');
                        setLoading(false);

                        // Temporarily pause detection overwrite
                        isShowingTemporaryMessage = true;

                        setTimeout(() => {
                            statusEl.textContent = "Searching for face...";
                            statusEl.classList.remove('text-red-500');
                            statusEl.classList.add('text-gray-300');
                            isShowingTemporaryMessage = false;
                            // resume detection
                            runDetection();
                        }, 3000);
                    }
                } else {
                    // Handle non-JSON responses (like Flask HTML error pages)
                    const text = await response.text();
                    console.error("Received non-JSON response:", response.status, response.statusText, text);
                    statusEl.textContent = "Error: Unexpected response from server. Check Flask logs.";
                    statusEl.classList.remove('text-green-400');
                    statusEl.classList.add('text-red-500');
                    setLoading(false);
                    showTemporaryMessageAndReset("Searching for face...", 3000);
                }

            } catch (err) {
                // Handle network errors or JSON parsing errors
                console.error("API error:", err);
                statusEl.textContent = "Error sending/processing request. Check console/network tab.";
                statusEl.classList.remove('text-green-400');
                statusEl.classList.add('text-red-500');
                setLoading(false);
                showTemporaryMessageAndReset("Searching for face...", 3000);
            }
        }

        // Helper: show a temporary message then reset to "Searching for face..."
        function showTemporaryMessageAndReset(messageAfter, ms = 3000) {
            isShowingTemporaryMessage = true;
            setTimeout(() => {
                statusEl.textContent = messageAfter;
                statusEl.classList.remove('text-red-500', 'text-green-400');
                statusEl.classList.add('text-gray-300');
                isShowingTemporaryMessage = false;
                runDetection();
            }, ms);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                actionButton.disabled = true;
                spinner.classList.remove('hidden');
                buttonText.textContent = 'Processing...';
            } else {
                actionButton.disabled = false;
                spinner.classList.add('hidden');
                buttonText.textContent = 'Verify Face'; // Text is "Verify"
            }
        }

        async function init() {
            try {
                statusEl.textContent = "Loading models...";
                await loadModels(); 
                
                statusEl.textContent = "Starting camera...";
                await startCamera(); 
                
                statusEl.textContent = "Searching for face...";
                statusEl.classList.remove('text-red-500', 'text-green-400');
                statusEl.classList.add('text-gray-300');
                runDetection(); // Start the detection loop
            } catch (err) {
                console.error("Initialization failed:", err);
                // More specific error message based on the stage
                if (!statusEl.textContent.startsWith("Error:")) { // Avoid overwriting specific camera errors
                     if (err.message.includes('face-api.js not found')) {
                        statusEl.textContent = "Error: face-api.js not found. Script tag is missing.";
                     } else if (statusEl.textContent.includes("Loading models...")) {
                         statusEl.textContent = "Error: Failed to load models. Check internet/firewall.";
                     } else {
                        statusEl.textContent = "Failed to start. Please refresh.";
                     }
                     statusEl.classList.add('text-red-500');
                }
            }
        }

        actionButton.addEventListener('click', captureAndSend);
        
        // Handle window resize
        window.addEventListener('resize', () => {
            // Only resize overlay if video stream exists and video has dimensions
            if (video.srcObject && video.readyState >= 3) { // readyState >= 3 means metadata/data is loaded
                overlay.width = video.clientWidth;
                overlay.height = video.clientHeight;
                console.log("Resized overlay canvas.");
            }
        });

        // Cleanup: Stop camera when the page is closed or navigated away from
        window.addEventListener('beforeunload', () => {
             stopCameraStream();
        });
        // Optional: Stop camera when tab loses focus (saves resources)
        window.addEventListener('blur', () => {
            // console.log("Window blurred - pausing detection might be useful here.");
             // stopCameraStream(); // You could uncomment this to stop camera aggressively
        });
        // Optional: Restart camera when tab gains focus
        window.addEventListener('focus', () => {
             // console.log("Window focused - restarting detection if paused.");
             // if (!stream) { init(); } // Restart if stopped
        });

        init();
    </script>
</body>
</html>
