<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Granted - System Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen w-full bg-gradient-to-br from-gray-900 to-gray-800 text-white flex flex-col items-center justify-center p-4">
    
    <!-- Success Animation -->
    <div class="text-center">
        <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <svg class="w-12 h-12 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h1 class="text-4xl font-bold mb-4 text-green-400">
            Access Granted
        </h1>
        
        <p class="text-2xl text-gray-300 mb-4">
            Welcome, {{ user_first_name }} {{ user_last_name }}!
        </p>
        
        <p class="text-lg text-green-300 mb-2">
            ✅ Door unlocked successfully
        </p>
        
        <div class="mt-12 p-4 bg-gray-800 rounded-lg max-w-md">
            <p class="text-gray-400 text-sm">
                Returning to login screen in <span id="countdown" class="font-mono text-white">5</span> seconds...
            </p>
            <div class="w-full bg-gray-700 rounded-full h-2 mt-2">
                <div id="progressBar" class="bg-green-500 h-2 rounded-full transition-all duration-1000" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <script>
        // Enhanced countdown with progress bar
        let seconds = 5;
        const countdownElement = document.getElementById('countdown');
        const progressBar = document.getElementById('progressBar');
        
        const countdown = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            progressBar.style.width = `${(seconds / 5) * 100}%`;
            
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = "{{ url_for('login') }}";  // Changed to login instead of logout
            }
        }, 1000);
    </script>
</body>
</html>
