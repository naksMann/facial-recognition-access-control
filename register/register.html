<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Control - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; }
        .messageDiv {
            background-color: hsl(327, 90%, 28%);
            color: white;
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.5s ease;
            display: none;
        }
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #9CA3AF;
        }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 4px;
            transition: all 0.3s ease;
        }
        .strength-weak { background-color: #EF4444; width: 25%; }
        .strength-fair { background-color: #F59E0B; width: 50%; }
        .strength-good { background-color: #10B981; width: 75%; }
        .strength-strong { background-color: #10B981; width: 100%; }
    </style>
</head>
<body class="min-h-screen text-gray-300 flex items-center justify-center p-4">
    <div class="bg-gray-800 shadow-xl rounded-2xl p-8 max-w-md w-full border border-gray-700">

        <div class="flex justify-center mb-6">
             <svg class="w-16 h-16 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
             </svg>
        </div>

        <h2 class="text-3xl font-bold text-center text-white mb-8">Register New User</h2>

        {% if error %}
            <div class="bg-red-900 border border-red-700 text-red-300 px-4 py-3 rounded relative mb-6 text-sm" role="alert">
                <span class="block sm:inline">{{ error }}</span>
            </div>
        {% endif %}

        <!-- Message div for JavaScript messages -->
        <div id="signUpMessage" class="messageDiv" style="display:none"></div>

        <form action="{{ url_for('register') }}" method="POST" class="space-y-6" id="registerForm">
            <div class="relative">
                <label for="firstName" class="block text-sm font-medium text-gray-400 mb-2">First Name</label>
                <div class="relative">
                    <!-- User SVG Icon -->
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <input type="text" name="firstName" id="firstName" required
                           class="pl-10 mt-1 block w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg shadow-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div id="firstNameError" class="text-red-400 text-xs mt-1 hidden"></div>
            </div>

            <div class="relative">
                <label for="lastName" class="block text-sm font-medium text-gray-400 mb-2">Last Name</label>
                <div class="relative">
                    <!-- User SVG Icon -->
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <input type="text" name="lastName" id="lastName" required
                           class="pl-10 mt-1 block w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg shadow-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div id="lastNameError" class="text-red-400 text-xs mt-1 hidden"></div>
            </div>

            <div class="relative">
                <label for="email" class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                <div class="relative">
                    <!-- Email SVG Icon -->
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                    </svg>
                    <input type="email" name="email" id="email" required autocomplete="email"
                           class="pl-10 mt-1 block w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg shadow-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div id="emailError" class="text-red-400 text-xs mt-1 hidden"></div>
            </div>

            <div class="relative">
                <label for="password" class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                <div class="relative">
                    <!-- Password SVG Icon -->
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                    
                    <input type="password" name="password" id="password" required autocomplete="new-password"
                           class="pl-10 pr-10 mt-1 block w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg shadow-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    
                    <!-- Eye SVG Icon for Show/Hide Password -->
                    <button type="button" id="togglePassword" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-300 focus:outline-none">
                        <svg id="eyeIcon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path id="eyeOpen" stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path id="eyeOpenLine" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            <path id="eyeClosed" class="hidden" stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </button>
                </div>
                <!-- Password Strength Meter -->
                <div class="mt-2">
                    <div id="passwordStrength" class="password-strength strength-weak"></div>
                    <div id="passwordRequirements" class="text-xs text-gray-400 mt-2">
                        <div id="lengthReq" class="flex items-center mb-1">
                            <span class="w-2 h-2 bg-gray-500 rounded-full mr-2"></span>
                            At least 6 characters
                        </div>
                        <div id="strengthReq" class="flex items-center">
                            <span class="w-2 h-2 bg-gray-500 rounded-full mr-2"></span>
                            Include uppercase, lowercase & numbers
                        </div>
                    </div>
                </div>
                <div id="passwordError" class="text-red-400 text-xs mt-1 hidden"></div>
            </div>

            <div>
                <button type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-blue-500 transition-colors duration-150">
                    Register
                </button>
            </div>
        </form>

        <p class="mt-8 text-center text-sm text-gray-500">
            Already registered?
            <a href="{{ url_for('login') }}" class="font-medium text-blue-500 hover:text-blue-400">
                Log in here
            </a>
        </p>
    </div>

    <script>
        // Message display function
        function showMessage(message, divId) {
            var messageDiv = document.getElementById(divId);
            if (!messageDiv) {
                console.error('Message div not found:', divId);
                return;
            }
            
            messageDiv.style.display = "block";
            messageDiv.innerHTML = message;
            messageDiv.style.opacity = 1;
            
            setTimeout(function() {
                messageDiv.style.opacity = 0;
                setTimeout(function() {
                    messageDiv.style.display = "none";
                }, 500);
            }, 5000);
        }

        // Show field error
        function showFieldError(fieldId, message) {
            const errorDiv = document.getElementById(fieldId + 'Error');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
                
                const inputField = document.getElementById(fieldId);
                if (inputField) {
                    inputField.classList.add('border-red-500');
                    inputField.classList.remove('border-gray-600');
                }
            }
        }

        // Clear field error
        function clearFieldError(fieldId) {
            const errorDiv = document.getElementById(fieldId + 'Error');
            if (errorDiv) {
                errorDiv.classList.add('hidden');
                
                const inputField = document.getElementById(fieldId);
                if (inputField) {
                    inputField.classList.remove('border-red-500');
                    inputField.classList.add('border-gray-600');
                }
            }
        }

        // Validate email format with common domains
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) return false;
            
            // Check for common email domains
            const commonDomains = [
                'gmail.com', 'yahoo.com', 'outlook.com', 'hotmail.com', 
                'icloud.com', 'protonmail.com', 'aol.com', 'zoho.com',
                'mail.com', 'yandex.com', 'gmx.com'
            ];
            
            const domain = email.split('@')[1].toLowerCase();
            return commonDomains.some(commonDomain => domain === commonDomain);
        }

        // Check password strength
        function checkPasswordStrength(password) {
            let strength = 0;
            const requirements = {
                length: password.length >= 6,
                lowercase: /[a-z]/.test(password),
                uppercase: /[A-Z]/.test(password),
                numbers: /[0-9]/.test(password),
                special: /[^A-Za-z0-9]/.test(password)
            };

            // Update requirement indicators
            document.getElementById('lengthReq').querySelector('span').style.backgroundColor = 
                requirements.length ? '#10B981' : '#6B7280';
            
            const strengthText = requirements.lowercase && requirements.uppercase && requirements.numbers ? 
                '#10B981' : '#6B7280';
            document.getElementById('strengthReq').querySelector('span').style.backgroundColor = strengthText;

            // Calculate strength score
            if (requirements.length) strength++;
            if (requirements.lowercase) strength++;
            if (requirements.uppercase) strength++;
            if (requirements.numbers) strength++;
            if (requirements.special) strength++;

            // Update strength meter
            const strengthBar = document.getElementById('passwordStrength');
            strengthBar.className = 'password-strength ';
            
            if (password.length === 0) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength === 3) {
                strengthBar.classList.add('strength-fair');
            } else if (strength === 4) {
                strengthBar.classList.add('strength-good');
            } else {
                strengthBar.classList.add('strength-strong');
            }

            return strength >= 3; // Minimum "fair" strength required
        }

        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeOpenLine = document.getElementById('eyeOpenLine');
            const eyeClosed = document.getElementById('eyeClosed');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeOpenLine.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeOpenLine.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }

        // Validate form
        function validateForm(firstName, lastName, email, password) {
            let isValid = true;
            
            // Clear previous errors
            clearFieldError('firstName');
            clearFieldError('lastName');
            clearFieldError('email');
            clearFieldError('password');
            
            // Validate first name
            if (!firstName.trim()) {
                showFieldError('firstName', 'First name is required');
                isValid = false;
            }
            
            // Validate last name
            if (!lastName.trim()) {
                showFieldError('lastName', 'Last name is required');
                isValid = false;
            }
            
            // Validate email
            if (!email) {
                showFieldError('email', 'Email is required');
                isValid = false;
            } else if (!isValidEmail(email)) {
                showFieldError('email', 'Please enter a valid email address (Gmail, Outlook, Yahoo, etc.)');
                isValid = false;
            }
            
            // Validate password
            if (!password) {
                showFieldError('password', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showFieldError('password', 'Password must be at least 6 characters');
                isValid = false;
            } else if (!checkPasswordStrength(password)) {
                showFieldError('password', 'Please use a stronger password with uppercase, lowercase letters and numbers');
                isValid = false;
            }
            
            return isValid;
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Add password visibility toggle
            const togglePasswordBtn = document.getElementById('togglePassword');
            if (togglePasswordBtn) {
                togglePasswordBtn.addEventListener('click', togglePasswordVisibility);
            }

            // Real-time email validation
            const emailInput = document.getElementById('email');
            if (emailInput) {
                emailInput.addEventListener('blur', function() {
                    const email = this.value.trim();
                    if (email && !isValidEmail(email)) {
                        showFieldError('email', 'Please enter a valid email address (Gmail, Outlook, Yahoo, etc.)');
                    } else {
                        clearFieldError('email');
                    }
                });
                
                emailInput.addEventListener('input', function() {
                    clearFieldError('email');
                });
            }

            // Real-time password strength check
            const passwordInput = document.getElementById('password');
            if (passwordInput) {
                passwordInput.addEventListener('input', function() {
                    const password = this.value;
                    checkPasswordStrength(password);
                    clearFieldError('password');
                });
            }

            // Form submission handler
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    const firstName = document.getElementById('firstName')?.value.trim();
                    const lastName = document.getElementById('lastName')?.value.trim();
                    const email = document.getElementById('email')?.value.trim();
                    const password = document.getElementById('password')?.value;
                    
                    if (!validateForm(firstName, lastName, email, password)) {
                        e.preventDefault();
                        showMessage('Please fix the errors above before submitting.', 'signUpMessage');
                    }
                });
            }

            // Check if there was an error from Flask
            const flaskError = "{{ error }}" || "";
            if (flaskError && flaskError !== "None" && flaskError !== "") {
                showMessage(flaskError, 'signUpMessage');
            }
        });
    </script>
</body>
</html>
